<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<link rel="stylesheet" href="http://cdn.bootcss.com/bootstrap/3.3.0/css/bootstrap.min.css">
<script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
<script src="http://cdn.bootcss.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
    <title>单词详情</title>
    <script>
        var onResize = function () {
            $("body").css("margin-top", $(".navbar").height() + 10);
        };
        $(window).resize(onResize);
        $(function () {
            onResize();
        });
    </script>
</head>
<body>

<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar"
                    aria-expanded="false" aria-controls="navbar">
                <span class="sr-only">英语单词学习助手</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="/index">英语单词学习助手</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
            <ul class="nav navbar-nav">
                <li><a href="/index">首页</a></li>
                <li><a href="/wordlist">单词列表</a></li>
                <li><a href="/wordsearch">单词搜索</a></li>
                <li><a href="/paratranslate">段落翻译</a></li>
                <li><a href="/wordtest">单词测试</a></li>
                <li class="active"><a href="/parasearch">短文检索</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <div class="text-center">
        <div class="form-group">
            <form method='get' action='/para_search/' class="form-inline">
                {% csrf_token %}
                <input type='search' name='para_name' placeholder='短文' required class="form-control">
                <button type='submit' class="btn btn-default">搜索</button>
            </form>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h2>{{ sentence }}</h2>
            </div>

        </div>
    </div>

    <div class="container" style="padding-top: 20px;">
        <ul class="nav nav-tabs" role="tablist" style="margin: 10px 10px 10px 10px;">
            <li role="presentation" class="active"><a href="#para_tran" aria-controls="para_tran" role="tab" data-toggle="tab">短文翻译</a></li>
        </ul>
        <!-- Tab panes -->
        <div class="tab-content">
                {% for para in para_list_search %}
                      <li>{{ para }}</li>
                      <li>{{ para.translation }}</li>
                {% endfor %}
            </div>
        </div>
    <hr class="featurette-divider">
    <footer class="text-center">
        <p><a href="/admin" target="_blank">后台管理</a></p>
    </footer>

    </div>
</body>


</html>
